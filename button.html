<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradient Border Button</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #f3f5f8;
      font-family: Arial, sans-serif;
    }

    .gradient-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 5px 20px;
      font-size: 18px;
      font-weight: 700;
      color: #1f4468;
      /* background: #ffffff; */
      border-radius: 999px;
      cursor: pointer;
      z-index: 1;
      overflow: visible;
    }

    /* Animated gradient border */
    .gradient-btn::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgb(255, 0, 0),
        rgb(238, 255, 0),
        rgba(255, 255, 255, 0.459),
        rgb(0, 193, 58),
        rgb(1, 1, 182),
        rgb(255, 98, 0)
        
      );
      background-size: 300% 300%;
      z-index: -2;
      animation: borderFlow 5s linear infinite;
    }

    /* Inner layer to create border thickness */
    .gradient-btn::after {
      content: "";
      position: absolute;
      inset: 0px;
      background: #ffffff;
      border-radius: inherit;
      z-index: -1;
    }

    /* Blur glow */
    .gradient-btn .glow {
      position: absolute;
      inset: 0px;
      border-radius: inherit;
      background: linear-gradient(
        90deg,
        rgb(255, 0, 0),
        rgb(238, 255, 0),
        rgba(255, 255, 255, 0.459),
        rgb(0, 193, 58),
        rgb(1, 1, 182),
        rgb(255, 98, 0)
      );
      background-size: 300% 300%;
      filter: blur(7px);
      opacity: 0.7;
      z-index: -3;
      animation: borderFlow 5s linear infinite;
    }

    @keyframes borderFlow {
      0% {
        background-position: 0% -50%;
      }
      100% {
        background-position: -300% -50%;
      }
    }

    /* .gradient-btn:hover {
      transform: translateY(-1px);
      transition: 0.25s ease;
    } */
  </style>
</head>
<body>
  <button class="gradient-btn">
    <span class="glow"></span>
     New
  </button>
</body>
</html>
